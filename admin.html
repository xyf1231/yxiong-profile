<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后台维护 | 熊毅丰</title>
    <link rel="stylesheet" href="styles.css?v=20250809-apple-v1.5.14" />
  </head>
  <body class="admin-body">
    <header class="site-header" data-elevated="true">
      <a class="brand" href="index.html"><span class="brand-mark">YX</span><span>后台维护</span></a>
      <nav class="nav-links" aria-label="后台导航">
        <a href="index.html">首页</a>
        <a href="publications.html">论文</a>
      </nav>
    </header>
    <main class="admin-shell">
      <section class="admin-hero">
        <div>
          <p class="section-kicker">Local CMS</p>
          <h1>后台维护</h1>
          <p class="hero-copy">选择网站文件夹后，上传的 PDF/图片会写入项目目录，并同步更新 data.js，发布时上传整个文件夹即可。</p>
        </div>
        <div class="admin-actions">
          <button class="admin-button" id="choose-site-folder" type="button">选择网站文件夹</button>
          <button class="admin-button primary" id="save-all" type="button">保存</button>
          <button class="admin-button" id="export-json" type="button">导出 JSON</button>
          <button class="admin-button danger" id="reset-data" type="button">恢复默认</button>
        </div>
        <p class="folder-status" id="folder-status">未选择网站文件夹：上传文件将只记录在浏览器本地数据里，不会写入 papers/、assets/ 或 data.js。</p>
      </section>
      <section class="admin-grid">
        <aside class="admin-tabs">
          <button class="tab-button" data-tab="profile" aria-selected="true" type="button">基本资料</button>
          <button class="tab-button" data-tab="research" type="button">研究内容</button>
          <button class="tab-button" data-tab="news" type="button">新闻</button>
          <button class="tab-button" data-tab="newsDetails" type="button">新闻详情</button>
          <button class="tab-button" data-tab="publications" type="button">论文</button>
          <button class="tab-button" data-tab="allPublications" type="button">全部论文</button>
          <button class="tab-button" data-tab="projects" type="button">项目</button>
          <button class="tab-button" data-tab="achievements" type="button">成果</button>
          <button class="tab-button" data-tab="experience" type="button">经历</button>
          <button class="tab-button" data-tab="contacts" type="button">联系方式</button>
        </aside>
        <div class="admin-workspace">
          <section class="editor-panel">
            <div class="section-heading inline">
              <div>
                <p class="section-kicker" id="active-kicker">Profile</p>
                <h2 id="active-title">基本资料</h2>
              </div>
              <button class="admin-button" id="add-item" type="button">新增</button>
            </div>
            <form class="form-grid" id="content-form"></form>
            <p class="upload-note">推荐先点“选择网站文件夹”。之后上传 PDF 会自动保存到 papers/，图片会自动保存到 assets/，并把 data.js 更新为可发布的相对路径。</p>
            <div class="editor-actions">
              <button class="admin-button primary" id="save-item" type="button">保存当前</button>
              <button class="admin-button" id="clear-form" type="button">清空</button>
            </div>
          </section>
          <section class="item-list" id="item-list"></section>
          <section class="json-panel">
            <textarea id="json-buffer" spellcheck="false"></textarea>
          </section>
        </div>
      </section>
    </main>
    <script src="data.js?v=20250809-apple-v1.5.14"></script>
    <script src="supabase-client.js?v=20250809-apple-v1.5.14"></script>
    <script src="admin.js?v=20250809-apple-v1.5.14"></script>
  </body>
</html>
